<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>graphicsProgramming - Coursera</title>
    <script src="libraries/p5.min.js" type="text/javascript"></script>
    <script src="libraries/p5.sound.min.js" type="text/javascript"></script>
    
    <script src="sketch.js" type="text/javascript"></script>

    <style>
      body {
        margin: 0;
        padding: 0;
        background: #111;
        color: #f2f2f2;
        font-family: Arial, sans-serif;
      }

      #canvas-holder canvas {
        display: block;
      }

      #canvas-holder {
        display: flex;
        justify-content: center;
      }

      #canvas-wrap {
        margin: 0 auto;
        overflow: hidden;
      }

      .instructions {
        padding: 12px 16px 20px;
        line-height: 1.4;
      }

      .instructions p {
        text-align: center;
        margin: 0 0 6px;
      }
    </style>
  </head>
  <body>
    <section class="instructions">
      <p>Image averaging algorithm over 30 samples with pixel-wise interpolation between source and mean face.</p>
      <p>Move mouse to blend output and press any key to load a new source face.</p>
    </section>
    <div id="canvas-wrap">
      <div id="canvas-holder"></div>
    </div>
  </body>
</html>
