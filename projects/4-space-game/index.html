<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>asteroids games clone</title>
    <script src="libraries/p5.min.js" type="text/javascript"></script>
    <script src="libraries/p5.sound.min.js" type="text/javascript"></script>

    <script src="bulletSystem.js" type="text/javascript"></script>
    <script src="asteroidSystem.js" type="text/javascript"></script>
    <script src="spaceship.js" type="text/javascript"></script>
    <script src="sketch.js" type="text/javascript"></script>

    <style>
      body {
        margin: 0;
        padding: 0;
        background: #111;
        color: #f2f2f2;
        font-family: Arial, sans-serif;
      }

      #canvas-wrap {
        width: 840px;
        height: 560px;
        margin: 0 auto;
        overflow: hidden;
      }

      #canvas-holder {
        width: 1200px;
        height: 800px;
        transform: scale(0.7);
        transform-origin: top left;
      }

      #canvas-holder canvas {
        display: block;
      }

      .instructions {
        padding: 12px 16px 20px;
        line-height: 1.4;
      }

      .instructions p {
        text-align: center;
        margin: 0 0 6px;
      }
    </style>
  </head>
  <body>
    <section class="instructions">
      <p>Multi-class arcade architecture with spaceship, bullets, asteroids, collision checks, and scoring.</p>
      <p>Use arrow keys to fly and press space to fire.</p>
    </section>
    <div id="canvas-wrap">
      <div id="canvas-holder"></div>
    </div>
  </body>
</html>
